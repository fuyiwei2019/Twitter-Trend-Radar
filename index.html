<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trend Radar · 推特新词雷达</title>
<style>
  :root{
    --bg:#0a0e0d;
    --panel:#101614;
    --panel-2:#0d1311;
    --line:#1d2926;
    --ink:#e7efe9;
    --ink-dim:#7d8f88;
    --ink-faint:#4d5b56;
    --signal:#ff8a3d;      /* 信号橙 —— 唯一强调色 */
    --signal-soft:#ffb37e;
    --green:#4ee39a;       /* 新站/正向 */
    --amber:#ffd25e;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(255,138,61,.07), transparent 60%),
      var(--bg);
    color:var(--ink);
    font-family:"SF Mono",ui-monospace,"Menlo","Cascadia Code",monospace;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1080px;margin:0 auto;padding:28px 22px 80px}

  /* ---- 顶部 ---- */
  header{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:14px}
  .dish{
    width:34px;height:34px;border-radius:50%;
    border:1.5px solid var(--signal);
    position:relative;flex:0 0 auto;
    box-shadow:0 0 24px rgba(255,138,61,.25);
  }
  .dish::before{
    content:"";position:absolute;inset:6px;border-radius:50%;
    border:1px solid rgba(255,138,61,.4);
  }
  .dish::after{
    content:"";position:absolute;left:50%;top:50%;width:50%;height:1.5px;
    background:linear-gradient(90deg,var(--signal),transparent);
    transform-origin:left center;transform:translateY(-50%);
    animation:sweep 2.6s linear infinite;
  }
  @keyframes sweep{to{transform:translateY(-50%) rotate(360deg)}}
  h1{font-size:18px;letter-spacing:.04em;margin:0;font-weight:600}
  .sub{font-size:11.5px;color:var(--ink-dim);margin-top:3px;letter-spacing:.02em}
  .status{font-size:11px;color:var(--ink-dim);text-align:right;line-height:1.6}
  .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--ink-faint);margin-right:5px;vertical-align:middle}
  .dot.live{background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 1.4s ease-in-out infinite}
  @keyframes pulse{50%{opacity:.35}}

  /* ---- 扫描进度线（signature）---- */
  .scanbar{height:2px;background:var(--line);margin:18px 0 0;border-radius:2px;overflow:hidden;position:relative}
  .scanbar > i{
    position:absolute;left:-40%;top:0;height:100%;width:40%;
    background:linear-gradient(90deg,transparent,var(--signal),transparent);
    animation:scan 1.5s ease-in-out infinite;display:none;
  }
  .scanbar.active > i{display:block}
  @keyframes scan{0%{left:-40%}100%{left:100%}}

  /* ---- 控制台 ---- */
  .console{
    margin-top:22px;background:var(--panel);border:1px solid var(--line);
    border-radius:12px;padding:18px;
  }
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end}
  .field{display:flex;flex-direction:column;gap:6px}
  .field.grow{flex:1 1 240px}
  label{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint)}
  input,select{
    background:var(--panel-2);border:1px solid var(--line);color:var(--ink);
    border-radius:8px;padding:10px 12px;font:inherit;font-size:13px;outline:none;
  }
  input:focus,select:focus{border-color:var(--signal)}
  input::placeholder{color:var(--ink-faint)}

  /* 关键词池输入框 */
  .kwbox{display:flex;flex-wrap:wrap;gap:6px;align-items:center;
    background:var(--panel-2);border:1px solid var(--line);border-radius:8px;
    padding:7px 9px;min-height:42px}
  .kwbox:focus-within{border-color:var(--signal)}
  .kwbox #q{flex:1 1 140px;min-width:120px;background:transparent;border:none;
    padding:3px 2px;font-size:13px}
  .kwbox #q:focus{border:none}
  .kwtag{display:inline-flex;align-items:center;gap:6px;font-size:12px;
    background:hsla(var(--hue,28),70%,50%,.13);color:hsl(var(--hue,28),75%,72%);
    border:1px solid hsla(var(--hue,28),70%,55%,.35);border-radius:6px;
    padding:3px 4px 3px 9px;white-space:nowrap}
  .kwdot{width:7px;height:7px;border-radius:50%;background:hsl(var(--hue,28),75%,60%)}
  .kwx{background:none;border:none;color:inherit;cursor:pointer;font-size:14px;
    line-height:1;padding:0 3px;opacity:.6}
  .kwx:hover{opacity:1}

  .presetbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:12px}
  .presetlabel{font-size:10.5px;color:var(--ink-faint);letter-spacing:.05em}
  .chip.addall{border-color:var(--signal);color:var(--signal-soft)}
  .chip.niche{border-style:dashed}
  .chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:2px}
  .chip{
    font-size:11px;padding:4px 9px;border:1px solid var(--line);border-radius:999px;
    color:var(--ink-dim);cursor:pointer;background:transparent;transition:.15s;
  }
  .chip:hover{border-color:var(--signal);color:var(--signal-soft)}

  .actions{display:flex;gap:10px;align-items:center;margin-top:16px;flex-wrap:wrap}
  button.go{
    background:var(--signal);color:#1a0d04;border:none;border-radius:8px;
    padding:11px 20px;font:inherit;font-weight:700;font-size:13px;cursor:pointer;
    letter-spacing:.02em;transition:.15s;
  }
  button.go:hover{background:var(--signal-soft)}
  button.ghost{
    background:transparent;color:var(--ink-dim);border:1px solid var(--line);
    border-radius:8px;padding:11px 16px;font:inherit;font-size:13px;cursor:pointer;
  }
  button.ghost:hover{border-color:var(--ink-dim);color:var(--ink)}
  button:disabled{opacity:.4;cursor:not-allowed}
  .auto{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink-dim);margin-left:auto}
  .auto select{padding:7px 9px;font-size:12px}

  /* ---- 统计条 ---- */
  .stats{display:flex;gap:26px;margin:22px 2px 6px;flex-wrap:wrap}
  .stat{display:flex;flex-direction:column;gap:2px}
  .stat b{font-size:22px;font-weight:700;letter-spacing:-.01em}
  .stat span{font-size:10.5px;color:var(--ink-faint);letter-spacing:.06em;text-transform:uppercase}
  .stat .accent{color:var(--signal)}
  .stat .ok{color:var(--green)}

  /* ---- 来源筛选条 ---- */
  .filterbar{display:flex;gap:8px;flex-wrap:wrap;margin:18px 2px 0}
  .fbtn{
    display:inline-flex;align-items:center;gap:7px;cursor:pointer;
    background:var(--panel-2);border:1px solid var(--line);color:var(--ink-dim);
    border-radius:999px;padding:6px 12px;font:inherit;font-size:12px;transition:.15s;
  }
  .fbtn:hover{color:var(--ink);border-color:var(--ink-faint)}
  .fbtn.on{color:var(--ink);border-color:hsl(var(--hue,28),80%,55%);background:hsla(var(--hue,28),70%,50%,.1)}
  .fbtn em{font-style:normal;color:var(--ink-faint);font-size:11px}
  .fbtn.on em{color:var(--ink)}
  .fdot{width:8px;height:8px;border-radius:50%;background:hsl(var(--hue,28),75%,58%);flex:0 0 auto}

  /* ---- 结果卡片 ---- */
  .feed{margin-top:14px;display:flex;flex-direction:column;gap:12px}
  .card{
    background:var(--panel);border:1px solid var(--line);border-radius:12px;
    padding:15px 16px;animation:rise .35s ease both;
    border-left:3px solid hsl(var(--hue,28),70%,52%);
  }
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .card.fresh{box-shadow:0 0 0 1px rgba(78,227,154,.12)}

  /* ---- 来源标签（卡片内顶部）---- */
  .src{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:11px;
       padding-bottom:10px;border-bottom:1px solid var(--line)}
  .srctag{font-size:11.5px;font-weight:700;color:hsl(var(--hue,28),75%,65%);
          background:hsla(var(--hue,28),70%,50%,.12);padding:3px 10px;border-radius:6px;letter-spacing:.02em}
  .srccond{font-size:11px;color:var(--ink-dim)}
  .srctime{font-size:10.5px;color:var(--ink-faint);margin-left:auto;white-space:nowrap}
  .chead{display:flex;align-items:baseline;justify-content:space-between;gap:12px}
  .who{font-size:13px;color:var(--ink)}
  .who .h{color:var(--ink-dim)}
  .when{font-size:11px;color:var(--ink-faint);white-space:nowrap}
  .ctext{font-size:13.5px;line-height:1.55;margin:10px 0 12px;color:var(--ink);word-break:break-word;cursor:pointer}
  .ctext.clamp{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ctext:hover{color:var(--ink)}
  .metrics{display:flex;gap:18px;font-size:11.5px;color:var(--ink-dim);flex-wrap:wrap}
  .metrics b{color:var(--ink);font-weight:600}
  .links{margin-top:12px;display:flex;flex-direction:column;gap:7px}
  .lk{
    display:flex;flex-direction:column;gap:9px;font-size:12px;
    background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:10px 11px;
  }
  .lkrow{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .lk a{color:var(--signal-soft);text-decoration:none;word-break:break-all}
  .lk a:hover{text-decoration:underline}
  .traffic{border-top:1px dashed var(--line);padding-top:9px}
  .traffic.none{color:var(--ink-faint);font-size:11px;border-top:1px dashed var(--line)}
  .traffic.none.warn{color:var(--amber)}
  .treason{color:var(--ink-faint);font-size:10px}
  .thead{display:flex;align-items:center;gap:10px;font-size:10.5px;color:var(--ink-faint);letter-spacing:.05em;margin-bottom:8px}
  .tdelta{font-weight:700}
  .tdelta.up{color:var(--green)}
  .tdelta.down{color:#ff7a6b}
  .trank{margin-left:auto;color:var(--ink-dim)}
  .tchart{display:block;margin-top:4px;overflow:visible}
  .svgmo{fill:var(--ink-dim);font-size:10px}
  .svgval{fill:var(--ink);font-size:11px;font-weight:600}
  .age{font-size:10.5px;padding:2px 8px;border-radius:999px;white-space:nowrap;font-weight:600}
  .age.new{background:rgba(78,227,154,.14);color:var(--green);border:1px solid rgba(78,227,154,.3)}
  .age.mid{background:rgba(255,210,94,.12);color:var(--amber);border:1px solid rgba(255,210,94,.25)}
  .age.old{background:rgba(125,143,136,.1);color:var(--ink-dim);border:1px solid var(--line)}
  .age.unk{background:transparent;color:var(--ink-faint);border:1px solid var(--line)}
  .age.plat{background:rgba(120,170,255,.12);color:#8fb6ff;border:1px solid rgba(120,170,255,.3)}
  .age.loading{background:transparent;color:var(--ink-faint);border:1px solid var(--line);
               animation:blink 1.1s ease-in-out infinite}
  .judge{border-top:1px dashed var(--line);padding-top:9px;font-size:11px;color:var(--ink-dim);display:flex;flex-direction:column;gap:5px}
  .jrow{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .jtag{font-size:10.5px;padding:2px 8px;border-radius:999px;border:1px solid var(--line);color:var(--ink-dim);background:rgba(125,143,136,.08);font-weight:600}
  .jtag.target{color:var(--green);border-color:rgba(78,227,154,.35);background:rgba(78,227,154,.12)}
  .jtag.noise{color:#ff7a6b;border-color:rgba(255,122,107,.35);background:rgba(255,122,107,.10)}
  .jtag.warn{color:var(--amber);border-color:rgba(255,210,94,.35);background:rgba(255,210,94,.10)}
  .jscore{color:var(--ink);font-weight:700}
  .jreason{color:var(--ink-faint);line-height:1.45}
  .finalurl{color:var(--ink-faint);font-size:10.5px;word-break:break-all}
  .finalurl b{color:var(--ink-dim);font-weight:500}
  @keyframes blink{50%{opacity:.4}}
  .traffic.none.pending{color:var(--ink-faint);animation:blink 1.1s ease-in-out infinite}
  .card.pending{opacity:.92}
  .whoislink.dim{color:var(--ink-faint);cursor:default}
  .whoislink{color:var(--ink-faint);font-size:10.5px;text-decoration:none;margin-left:auto}
  .whoislink:hover{color:var(--ink-dim);text-decoration:underline}

  .empty{color:var(--ink-faint);font-size:13px;text-align:center;padding:48px 0;line-height:1.7}
  .log{margin-top:8px;font-size:11px;color:var(--ink-faint);min-height:16px}
  .err{color:#ff7a6b}
  .legend{font-size:10.5px;color:var(--ink-faint);margin-top:18px;display:flex;gap:16px;flex-wrap:wrap}
  .legend i{font-style:normal}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand">
      <div class="dish"></div>
      <div>
        <h1>TREND RADAR</h1>
        <div class="sub">实时扫描推特 · 筛带链接的高互动推文 · 反查域名注册时间 + 近三月流量</div>
      </div>
    </div>
    <div class="status">
      <div><span class="dot" id="keydot"></span><span id="keytext">检查 key…</span></div>
      <div id="cyclelabel">待命</div>
    </div>
  </header>

  <div class="scanbar" id="scanbar"><i></i></div>

  <div class="console">
    <div class="row">
      <div class="field grow">
        <label>关键词池（每轮逐个查）</label>
        <div class="kwbox" id="kwbox">
          <input id="q" placeholder="输入关键词后回车添加，可加多个…" autocomplete="off">
        </div>
      </div>
      <div class="field">
        <label>点赞下限</label>
        <input id="minfaves" type="number" value="300" style="width:110px">
      </div>
      <div class="field">
        <label>仅带链接</label>
        <select id="links"><option value="1">是</option><option value="0">否</option></select>
      </div>
      <div class="field">
        <label>推文时间</label>
        <select id="hours">
          <option value="6">最近 6 小时</option>
          <option value="12">最近 12 小时</option>
          <option value="24">最近 24 小时</option>
          <option value="48" selected>最近 48 小时</option>
          <option value="72">最近 72 小时</option>
          <option value="168">最近 7 天</option>
          <option value="0">不限</option>
        </select>
      </div>
      <div class="field">
        <label>每词拉取</label>
        <input id="limit" type="number" value="100" min="1" max="200" style="width:100px">
      </div>
      <div class="field">
        <label>域名最大天龄</label>
        <select id="maxage">
          <option value="0">不限</option>
          <option value="30">≤ 30 天</option>
          <option value="90">≤ 90 天</option>
          <option value="180">≤ 180 天</option>
          <option value="365">≤ 1 年</option>
          <option value="730">≤ 2 年</option>
          <option value="1095">≤ 3 年</option>
          <option value="1825">≤ 5 年</option>
        </select>
      </div>
      <div class="field">
        <label>噪音过滤</label>
        <select id="noise">
          <option value="hide_noise" selected>隐藏噪音</option>
          <option value="ai_only">只看目标机会</option>
          <option value="all">全部显示</option>
        </select>
      </div>
    </div>
    <div class="presetbar" id="presetbarLaunch">
      <span class="presetlabel">发布信号词：</span>
      <span class="chips" id="chips"></span>
      <button class="chip addall" id="addall">＋ 全部加入</button>
    </div>
    <div class="presetbar" id="presetbarNiche">
      <span class="presetlabel">赛道词（可叠加）：</span>
      <span class="chips" id="chipsNiche"></span>
    </div>

    <div class="actions">
      <button class="go" id="run">扫一遍全部</button>
      <button class="ghost" id="clear">清空结果</button>
      <div class="auto">
        自动巡逻
        <select id="interval">
          <option value="0">关</option>
          <option value="1800">每 30 分钟</option>
          <option value="3600" selected>每 1 小时</option>
          <option value="10800">每 3 小时</option>
        </select>
        <button class="ghost" id="toggleauto">启动</button>
      </div>
    </div>
    <div class="log" id="log"></div>
  </div>

  <div class="stats">
    <div class="stat"><b id="s_total">0</b><span>累计命中</span></div>
    <div class="stat"><b id="s_fresh" class="ok">0</b><span>新站 ≤30天</span></div>
    <div class="stat"><b id="s_cycles" class="accent">0</b><span>已扫描轮次</span></div>
    <div class="stat"><b id="s_domains">0</b><span>去重域名</span></div>
  </div>

  <div class="filterbar" id="filterbar" style="display:none"></div>

  <div class="feed" id="feed">
    <div class="empty" id="empty">雷达待命中。<br>在关键词池里加几个赛道词，点「扫一遍全部」或启动自动巡逻。</div>
  </div>

  <div class="legend">
    <i>域名天龄：</i>
    <i><span class="age new" style="padding:1px 7px">新</span> ≤30天</i>
    <i><span class="age mid" style="padding:1px 7px">较新</span> ≤180天</i>
    <i><span class="age old" style="padding:1px 7px">老</span> &gt;180天</i>
    <i><span class="age plat" style="padding:1px 7px">⚡平台</span> 子域名·看流量</i>
    <i><span class="age unk" style="padding:1px 7px">?</span> 查不到</i>
  </div>
</div>

<script>
const $ = s => document.querySelector(s);
const feed = $("#feed"), empty = $("#empty"), log = $("#log");
// 点击推文正文：展开/收起（默认只显示一行）
feed.addEventListener("click", e=>{
  const t = e.target.closest(".ctext");
  if(t && !e.target.closest("a")) t.classList.toggle("clamp");
});

// 给每个不同的关键词分配一个稳定的色相，卡片左边条 + 标签同色
const _hues = {}; let _hueStep = 0;
function hueFor(key){
  if(!(key in _hues)){ _hues[key] = (_hueStep*67 + 25) % 360; _hueStep++; }
  return _hues[key];
}

const seenIds = new Set();
const seenDomains = new Set();
const queryCounts = {};   // 每个关键词命中多少条
let activeFilter = null;  // 当前来源筛选（null = 全部）
let cycles = 0, totalHits = 0, freshHits = 0;
let autoTimer = null, running = false;

// ===== 关键词池 =====
// 默认池用"发布信号词"——别人刚发布新产品时会说的话。
// 这类词配合 filter:links 命中的是"发布瞬间 + 带 demo 链接"的源头推文。
const keywords = ["just launched", "just shipped", "introducing"];  // 初始池
let rrIndex = 0;          // round-robin 指针，自动巡逻轮流取词

// 发布信号词（核心）：抓"我刚做了个东西"的发布瞬间
const presetLaunch = [
  "just launched", "just shipped", "introducing", "just built",
  "launched my", "built this", "I made", "just made", "just released",
  "we just launched", "now live", "go live", "soft launch",
  "my new app", "my new tool", "side project", "weekend project",
  "first version", "v1 is live", "check out my", "try my new",
  "shipped my", "finally launched", "launching today", "live on",
  "made a site", "made a website", "built a tool", "built an app",
  "created a tool", "I built", "just created", "new site",
];
// 赛道词（可选叠加）：缩到具体品类时用
const presetNiche = [
  "AI agent", "text to video", "AI image", "AI voice", "AI dubbing",
  "MCP server", "background remover", "resume builder", "invoice generator",
];
const presets = presetLaunch;  // 快捷栏默认展示发布信号词

const kwbox = $("#kwbox"), qInput = $("#q");

function renderKeywords(){
  // 移除旧标签（保留 input）
  kwbox.querySelectorAll(".kwtag").forEach(t=>t.remove());
  keywords.forEach((k,i)=>{
    const hue = hueFor(k);
    const tag=document.createElement("span");
    tag.className="kwtag"; tag.style.setProperty("--hue",hue);
    tag.innerHTML=`<span class="kwdot"></span>${escAttr(k)}<button class="kwx" data-i="${i}">×</button>`;
    kwbox.insertBefore(tag, qInput);
  });
  kwbox.querySelectorAll(".kwx").forEach(b=>{
    b.onclick=()=>{ keywords.splice(+b.dataset.i,1); renderKeywords(); };
  });
  refreshPresetState();
}
function escAttr(s){return (s||"").replace(/[<>&"]/g,c=>({"<":"&lt;",">":"&gt;","&":"&amp;",'"':"&quot;"}[c]));}

function addKeyword(k){
  k=(k||"").trim();
  if(!k) return;
  if(keywords.some(x=>x.toLowerCase()===k.toLowerCase())) return; // 去重
  keywords.push(k); renderKeywords();
}

qInput.addEventListener("keydown",e=>{
  if(e.key==="Enter"){ e.preventDefault(); addKeyword(qInput.value); qInput.value=""; }
  else if(e.key==="Backspace" && !qInput.value && keywords.length){
    keywords.pop(); renderKeywords();   // 空输入按退格删最后一个
  }
});

const chips = $("#chips"), chipsNiche = $("#chipsNiche");
function refreshPresetState(){

function ageBadge(link){
  if(link.platform){
    return `<span class="age plat" title="部署在 ${esc(link.platform)}，主域名年龄无意义，看流量判断新旧">⚡${esc(link.platform)}</span>`;
  }
  if(link.age_days==null) return '<span class="age unk" title="注册局未公开注册日期（常见于 .ai/.io/.app 等），改看流量判断新旧">年龄未知</span>';
  const d=link.age_days;
  let cls="old", txt=d+"天";
  if(d<=30){cls="new";txt="新 "+d+"天";}
  else if(d<=180){cls="mid";txt=d+"天";}
  return `<span class="age ${cls}">${txt}</span>`;
}

function esc(s){return (s||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}

function fmtVisits(n){
  if(n==null) return "";
  if(n>=1e9) return (n/1e9).toFixed(1)+"B";
  if(n>=1e6) return (n/1e6).toFixed(1)+"M";
  if(n>=1e3) return (n/1e3).toFixed(1)+"K";
  return ""+n;
}

function fmtScore(n){
  if(n==null || n==="") return "";
  const v=Number(n);
  if(!isFinite(v)) return "";
  if(v>=1000) return fmtVisits(v);
  return v.toFixed(v>=100 ? 0 : 1);
}

function trafficBlock(t){
  if(!t) return "";
  if(t.status==="failed"){
    const why = t.reason? `<span class="treason">（${esc(t.reason)}）</span>` : "";
    return `<div class="traffic none warn">流量：本轮查询失败，下次扫描会自动重试 ${why}</div>`;
  }
  if(t.status==="none" || !t.series || !t.series.length){
    const rank = t.global_rank? `（全球 #${t.global_rank.toLocaleString()}）` : "";
    return `<div class="traffic none">流量：暂无月度数据 ${rank}</div>`;
  }
  const s=t.series;
  const max=Math.max(...s.map(x=>x.visits))||1;
  const first=s[0].visits, last=s[s.length-1].visits;
  const up = last>=first;
  let deltaLabel;
  if(first===0 && last>0){ deltaLabel=`<span class="tdelta up">▲ 新增起量</span>`; }
  else if(first===0){ deltaLabel=""; }
  else {
    const delta=Math.round((last-first)/first*100);
    deltaLabel=`<span class="tdelta ${up?'up':'down'}">${up?'▲':'▼'} ${Math.abs(delta)}%</span>`;
  }
  // 用 SVG 画柱状图，几何尺寸绝对可靠，0 就是矮柱
  const BW=34, GAP=18, TRACK=42, LABEL=28;
  const chartW = s.length*BW + (s.length-1)*GAP;
  const chartH = TRACK + LABEL;
  const bars = s.map((x,i)=>{
    const bh = x.visits<=0 ? 3 : Math.max(8, Math.round(x.visits/max*TRACK));
    const xpos = i*(BW+GAP);
    const ypos = TRACK - bh;
    const mo = x.date.slice(5,7);
    const fill = x.visits<=0 ? "var(--line)" : "var(--signal)";
    const vlabel = x.visits<=0 ? "0" : fmtVisits(x.visits);
    return `
      <rect x="${xpos}" y="${ypos}" width="${BW}" height="${bh}" rx="3" fill="${fill}"/>
      <text x="${xpos+BW/2}" y="${TRACK+12}" text-anchor="middle" class="svgmo">${mo}月</text>
      <text x="${xpos+BW/2}" y="${TRACK+24}" text-anchor="middle" class="svgval">${vlabel}</text>`;
  }).join("");
  const rank = t.global_rank? `全球 #${t.global_rank.toLocaleString()}` : "";
  return `<div class="traffic">
      <div class="thead">
        <span>近三月流量</span>
        ${deltaLabel}
        ${rank?`<span class="trank">${rank}</span>`:""}
      </div>
      <svg class="tchart" width="${chartW}" height="${chartH}" viewBox="0 0 ${chartW} ${chartH}">
        ${bars}
      </svg>
    </div>`;
}

function fmtWhen(s){
  if(!s) return "";
  const t=new Date(s); if(isNaN(t)) return s;
  const mins=Math.round((Date.now()-t)/60000);
  if(mins<60) return mins+"分钟前";
  if(mins<1440) return Math.round(mins/60)+"小时前";
  return Math.round(mins/1440)+"天前";
}


function sourceLabel(src){
  const hue = hueFor(src.query);
  const cond = [];
  if(src.min_faves && src.min_faves!=="0") cond.push("♥≥"+src.min_faves);
  if(src.links==="1") cond.push("带链接");
  if(src.hours && src.hours!=="0") cond.push("近"+src.hours+"h");
  if(src.limit) cond.push("拉"+src.limit+"条");
  if(src.max_age && src.max_age!=="0") cond.push("≤"+src.max_age+"天");
  const condTxt = cond.length? cond.join(" · ") : "无附加条件";
  return `<div class="src" style="--hue:${hue}">
      <span class="srctag">${esc(src.query)}</span>
      <span class="srccond">${esc(condTxt)}</span>
      <span class="srctime">第${src.cycle}轮 · ${src.stamp}</span>
    </div>`;
}

function isLinkFresh(l){
  if(l.age_days!=null && l.age_days<=30) return true;
  if(l.platform && l.traffic && l.traffic.status==="ok"){
    const s=l.traffic.series||[];
    if(s.length && s[s.length-1].visits > (s[0].visits||0)) return true;
  }
  return false;
}

function judgeBlock(l){
  const j = l.judgment || null;
  if(!j){
    return `<div class="judge"><div class="jrow"><span class="jtag warn">判断中…</span></div></div>`;
  }
  const cat = j.content_category || j.noise_category || "unknown";
  const level = j.target_level || (j.is_target ? "target" : (j.is_noise ? "reject" : "watch"));
  const cls = level==="target" ? "target" : (level==="watch" ? "warn" : "noise");
  const label = level==="target" ? "目标" : (level==="watch" ? "观察" : "过滤");
  const score = (j.opportunity_score!=null) ? `<span>机会分 <b class="jscore">${esc(String(j.opportunity_score))}</b></span>` : "";
  const fit = j.product_fit ? `<span>产品匹配：${esc(j.product_fit)}</span>` : "";
  const opp = j.opportunity_type ? `<span>机会：${esc(j.opportunity_type)}</span>` : "";
  const src = j.judge_source ? `<span>${esc(j.judge_source)}</span>` : "";
  const action = j.recommended_action ? `<div class="jreason">${esc(j.recommended_action)}</div>` : "";
  const reason = j.reason ? `<div class="jreason">${esc(j.reason)}</div>` : (j.ai_error ? `<div class="jreason">${esc(j.ai_error)}</div>` : "");
  return `<div class="judge">
    <div class="jrow"><span class="jtag ${cls}">${esc(cat)} · ${label}</span>${score}${fit}${opp}${src}</div>
    ${action}${reason}
  </div>`;
}

// 渲染单条链接的内部（年龄徽章 + 流量 + AI/噪音判断），enrich 前后都用它
function linkInner(l){
  const whoisLink = l.platform
    ? `<span class="whoislink dim" title="部署在平台子域名上，无独立 whois">无独立注册</span>`
    : `<a class="whoislink" href="https://who.is/whois/${esc(l.domain)}" target="_blank" rel="noopener">who.is ↗</a>`;
  const badge = l.pending ? `<span class="age loading">查询中…</span>` : ageBadge(l);
  const traffic = l.pending
    ? `<div class="traffic none pending">流量查询中…</div>`
    : trafficBlock(l.traffic);
  const href = l.final_url || l.url;
  const label = l.domain || l.final_host || l.host || href;
  const final = (!l.pending && l.final_url && l.url && l.final_url !== l.url)
    ? `<div class="finalurl"><b>最终：</b>${esc(l.final_url)}</div>` : "";
  const discovery = l.discovery_source ? `<span class="jtag target">${esc(l.discovery_source)} 来源</span>` : "";
  return `
    <div class="lkrow">
      ${badge}
      <a href="${esc(href)}" target="_blank" rel="noopener">${esc(label)}</a>
      ${discovery}
      ${whoisLink}
    </div>
    ${final}
    ${traffic}
    ${l.pending ? '<div class="judge"><div class="jrow"><span class="jtag warn">URL/AI 判断中…</span></div></div>' : judgeBlock(l)}`;
}

// 全局并发限流队列：enrich 请求最多同时 4 个，
// 避免一轮十几个域名同时打 aitdk 被 CDN 掐连接(SSL EOF)。
const _enrichQueue = [];
let _enrichActive = 0;
const ENRICH_CONCURRENCY = 4;

function enqueueEnrich(host, url, maxAge, text){
  return new Promise((resolve)=>{
    _enrichQueue.push({host, url, maxAge, text, resolve});
    pumpEnrich();
  });
}
function pumpEnrich(){
  while(_enrichActive < ENRICH_CONCURRENCY && _enrichQueue.length){
    const job = _enrichQueue.shift();
    _enrichActive++;
    const p = new URLSearchParams({host:job.host, url:job.url||"", text:job.text||"",
                                   whois:"1", traffic:"1", judge:"1",
                                   max_age_days:job.maxAge||"0"});
    fetch("/api/enrich?"+p.toString())
      .then(r=>r.json())
      .then(e=>job.resolve(e))
      .catch(()=>job.resolve({__error:true}))
      .finally(()=>{ _enrichActive--; pumpEnrich(); });
  }
}

// 逐域名调 /api/enrich，回来后回填该链接，并据年龄上限决定是否隐藏整卡
async function enrichCard(cardId, src){
  const card = document.getElementById(cardId);
  if(!card) return;
  const item = card._item;
  const cap = parseInt(card.dataset.maxage||"0",10);

  await Promise.all(item.links.map(async (l,i)=>{
    const e = await enqueueEnrich(l.host||l.domain, l.url||"", cap, item.text||"");
    if(e && !e.__error){
      Object.assign(l, {
        domain:e.domain||l.domain, platform:e.platform,
        final_url:e.final_url||l.url, final_host:e.final_host||l.host,
        original_url:e.original_url||l.url, discovery_source:e.discovery_source||l.discovery_source,
        created:e.created, age_days:e.age_days,
        age_unreliable:e.age_unreliable,
        qualified:e.qualified, traffic:e.traffic,
        landing:e.landing, judgment:e.judgment, greylisted:e.greylisted,
        pending:false
      });
    }else{
      l.pending=false; l.traffic={status:"failed",reason:"enrich 请求失败"};
    }
    const lkEl = document.getElementById(cardId+"_lk"+i);
    if(lkEl) lkEl.innerHTML = linkInner(l);
  }));

  // 全部链接补完。不再删除卡片——只按当前档位决定显示/隐藏，
  // 数据全留着，改档位时可瞬时重新过滤。
  card.classList.remove("pending");
  card.dataset.enriched = "1";
  // fresh 标记（与档位无关，只看是否真的新）
  if(item.links.some(isLinkFresh)) card.classList.add("fresh");
  item.links.forEach(l=>l.domain&&seenDomains.add(l.domain));
  await saveResult(item, src);
  applyAgeFilterToCard(card);
  updateVisibleStats();
}

async function saveResult(item, src){
  try{
    const r = await fetch("/api/save_result", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({item, source:src})
    });
    const j = await r.json();
    if(j && j.saved){
      const csv = j.files && j.files.csv ? j.files.csv.split(/[\/]/).pop() : "CSV";
      const md = j.files && j.files.md ? j.files.md.split(/[\/]/).pop() : "Markdown";
      log.innerHTML += ` · 已保存 ${j.saved} 行到 ${esc(csv)} / ${esc(md)}`;
    }
  }catch(e){
    // 保存失败不影响页面展示；只在日志轻提示。
    log.innerHTML += ` · <span class="err">保存失败</span>`;
  }
}

// 单卡片按当前"域名最大天龄"判断是否该显示
function ageVisible(card){
  const cap = parseInt($("#maxage").value||"0",10);
  if(cap<=0) return true;                       // 不限
  const item = card._item;
  // 平台子域名 / 年龄未知 → 不因年龄淘汰；否则需 age≤cap
  return item.links.some(l=> l.platform || l.age_unreliable
                            || (l.age_days!=null && l.age_days<=cap));
}
function noiseVisible(card){
  const mode = $("#noise") ? $("#noise").value : "all";
  if(mode==="all") return true;
  if(!card.dataset.enriched) return true;
  const item = card._item;
  return item.links.some(l=>{
    const j = l.judgment || {};
    if(mode==="hide_noise") return !j.is_noise;
    if(mode==="ai_only") return !!j.is_target;
    return true;
  });
}
function applyAgeFilterToCard(card){
  // 同时受"来源筛选"、"年龄档位"、"噪音过滤"三个条件约束
  const passAge = !card.dataset.enriched ? true : ageVisible(card);
  const passNoise = !card.dataset.enriched ? true : noiseVisible(card);
  const passSrc = !activeFilter || card.dataset.query===activeFilter;
  card.style.display = (passAge && passNoise && passSrc) ? "" : "none";
  card.dataset.agehidden = passAge ? "" : "1";
}
// 改档位时，重新过滤所有已 enrich 的卡片（瞬时，无需重查）
function applyAgeFilter(){
  feed.querySelectorAll(".card").forEach(applyAgeFilterToCard);
  updateVisibleStats();
}
// 统计按"当前可见"重新计算
function updateVisibleStats(){
  const cards=[...feed.querySelectorAll(".card")];
  const visible=cards.filter(c=>c.style.display!=="none");
  const fresh=visible.filter(c=>c.classList.contains("fresh"));
  const doms=new Set();
  visible.forEach(c=>c._item.links.forEach(l=>l.domain&&doms.add(l.domain)));
  $("#s_total").textContent=visible.length;
  $("#s_fresh").textContent=fresh.length;
  $("#s_domains").textContent=doms.size;
  // 来源计数也按可见刷新
  for(const k in queryCounts) delete queryCounts[k];
  visible.forEach(c=>{const q=c.dataset.query; queryCounts[q]=(queryCounts[q]||0)+1;});
  refreshFilterBar();
}

function setScan(on){ $("#scanbar").classList.toggle("active",on); }

function refreshFilterBar(){
  const bar = $("#filterbar");
  const keys = Object.keys(queryCounts);
  if(!keys.length){ bar.innerHTML=""; bar.style.display="none"; return; }
  bar.style.display="flex";
  const totalVisible = Object.values(queryCounts).reduce((a,b)=>a+b,0);
  let html = `<button class="fbtn${activeFilter===null?' on':''}" data-q="__all">全部 <em>${totalVisible}</em></button>`;
  keys.forEach(k=>{
    const hue = hueFor(k);
    const on = activeFilter===k ? ' on':'';
    html += `<button class="fbtn${on}" data-q="${esc(k)}" style="--hue:${hue}">
       <span class="fdot"></span>${esc(k)} <em>${queryCounts[k]}</em></button>`;
  });
  bar.innerHTML = html;
  bar.querySelectorAll(".fbtn").forEach(b=>{
    b.onclick=()=>{
      const q=b.dataset.q;
      activeFilter = (q==="__all") ? null : q;
      applyAgeFilter();   // 组合过滤（年龄+来源）并刷新统计
    };
  });
}

function applyFilter(){ applyAgeFilter(); }   // 兼容旧调用

// 查单个关键词：搜索 → 立即铺卡 → 异步补 whois/流量
async function scanOne(q){
  q=(q||"").trim();
  if(!q) return;
  const p=new URLSearchParams({
    query:q, min_faves:$("#minfaves").value||"0",
    links:$("#links").value, max_age_days:$("#maxage").value,
    hours:$("#hours").value, limit:$("#limit").value||"100",
    whois:"1", traffic:"1"
  });
  log.innerHTML=`> 查询 X：<b style="color:var(--signal-soft)">${esc(q)}</b> …`;
  let attempt=0;
  while(true){
    try{
      const r=await fetch("/api/search?"+p.toString());
      const j=await r.json();
      if(j.error){
        if(j.retryable && attempt<1){ attempt++; await sleep(1500); continue; }
        let hint="";
        if(/SSL|EOF|URLError|timed out|reset/i.test(j.message||"")){
          hint="（网络/SSL 中断，多为代理或 VPN 拦截 api.aisa.one）";
        }
        log.innerHTML=`<span class="err">✕ ${esc(j.message||j.error)} 「${esc(q)}」 ${hint}</span>`;
        return;
      }
      cycles++; $("#s_cycles").textContent=cycles;
      const stamp=new Date().toLocaleTimeString();
      const src={ query:q, min_faves:$("#minfaves").value||"0",
        links:$("#links").value, hours:$("#hours").value, limit:$("#limit").value||"100",
        max_age:$("#maxage").value, cycle:cycles, stamp:stamp };
      let added=0;
      (j.results||[]).slice().reverse().forEach(it=>{
        if(it.id && seenIds.has(it.id)) return;
        if(it.id) seenIds.add(it.id);
        added++;
        empty.style.display="none";
        render(it, src);
      });
      updateVisibleStats();   // 统计与来源条由它统一刷新（含 pending 卡片）
      log.innerHTML=`> ${stamp} ·「<b style="color:var(--signal-soft)">${esc(q)}</b>」：${j.count} 条按速度排序，新增 <b style="color:var(--green)">${added}</b> 条，补充年龄/流量并自动保存中…`;
      return;
    }catch(e){
      log.innerHTML=`<span class="err">✕ 代理未响应，确认 server.py 正在运行</span>`;
      return;
    }
  }
}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

// 扫一遍全部：池子里所有关键词依次查（逐个，避免一次性打爆接口）
async function scanAll(){
  if(running) return;
  if(!keywords.length){ log.innerHTML=`<span class="err">关键词池是空的，先加几个词</span>`; return; }
  running=true; setScan(true); $("#run").disabled=true;
  const total=keywords.length;
  for(let i=0;i<keywords.length;i++){
    $("#cyclelabel").textContent=`扫描中 ${i+1}/${total}…`;
    await scanOne(keywords[i]);
  }
  $("#cyclelabel").textContent = autoTimer? "自动巡逻中" : "待命";
  $("#run").disabled=false; setScan(false); running=false;
}

// 自动巡逻一次 tick：round-robin 取下一个词（轮流，不重复打同一个）
async function scanNext(){
  if(running || !keywords.length) return;
  running=true; setScan(true);
  const q=keywords[rrIndex % keywords.length];
  rrIndex=(rrIndex+1)%keywords.length;
  $("#cyclelabel").textContent="自动巡逻中";
  await scanOne(q);
  setScan(false); running=false;
}

$("#run").onclick=scanAll;
$("#clear").onclick=()=>{
  feed.querySelectorAll(".card").forEach(c=>c.remove());
  seenIds.clear(); seenDomains.clear();
  for(const k in queryCounts) delete queryCounts[k];
  activeFilter=null; refreshFilterBar();
  totalHits=0; freshHits=0; cycles=0; rrIndex=0;
  ["s_total","s_fresh","s_cycles","s_domains"].forEach(i=>$("#"+i).textContent="0");
  empty.style.display="block"; log.textContent="";
};

$("#toggleauto").onclick=()=>{
  if(autoTimer){
    clearInterval(autoTimer); autoTimer=null;
    $("#toggleauto").textContent="启动"; $("#cyclelabel").textContent="待命";
  }else{
    if(!keywords.length){ log.innerHTML=`<span class="err">关键词池是空的，先加几个词</span>`; return; }
    const sec=parseInt($("#interval").value,10);
    if(!sec){ $("#interval").focus(); return; }
    scanNext();
    autoTimer=setInterval(scanNext, sec*1000);
    $("#toggleauto").textContent="停止"; $("#cyclelabel").textContent="自动巡逻中";
  }
};
$("#interval").onchange=()=>{
  if(autoTimer){ $("#toggleauto").click(); $("#toggleauto").click(); }
};
// 改"域名最大天龄 / 噪音过滤"：对已查到的卡片即时重新过滤，无需重查
$("#maxage").onchange=()=>{ applyAgeFilter(); };
$("#noise").onchange=()=>{ applyAgeFilter(); };
</script>
</body>
</html>
